# Built-in Clustra pages are first-party routes now and are enabled by default in
# values.yaml. Use this file only as a reference for overriding backend URLs or
# keeping legacy extension installation disabled.
clustraPages:
  deployModels:
    backendUrl: http://clustra-ai-service.clustra.svc:80
  modelCache:
    backendUrl: http://model-cache-backend.clustra.svc:80

server:
  extensions:
    enabled: false

platformExtensions:
  # Keep disabled for Deploy Models and Model Cache. These pages already ship in
  # the main UI and do not need system-level extension bundles.
  enabled: false
  items: []
