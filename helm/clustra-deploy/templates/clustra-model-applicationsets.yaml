{{- /*
ONE global ApplicationSet for the whole platform — generates one Application per
model directory across every team's repo, with the clean-delete sync policy
baked in. Replaces the old per-tenant ApplicationSets.

Generator = matrix( SCM-provider(<provider>, owner, repos matching ^team-.+ ) x
git-directories('*') ). For each team-* repo it discovers, it lists the model
directories and stamps an Application:
  * name      = <repo>-<dir>            (globally unique across teams)
  * project   = <repo> minus "team-" prefix, lowercased   (== the team AppProject)
  * source    = the team repo (HTTPS) / the model dir
  * namespace = the team (one shared namespace per team)
  * syncPolicy = automated prune/selfHeal + PrunePropagationPolicy=background
  * finalizer  = resources-finalizer.argocd.argoproj.io/background  (the REAL
                 stuck-delete fix: makes Application DELETION cascade in the
                 background so no foregroundDeletion wedges on Dynamo worker pods)

PROVIDER-AGNOSTIC: the gen-0 SCM provider is selected by `clustraScm.provider`
(github | gitlab | gitea | bitbucket | bitbucketServer | azureDevOps). Only the
gen-0 block differs per platform; everything downstream (the git generator, the
Application template, the AppProjects, and ai-service's HTTPS commit auth) is
identical across hosts. Legacy back-compat: if `clustraScm.provider` is unset but
`clustraGithubOrg` is set, it renders exactly the previous github-only behavior.

HARD REQUIREMENTS baked in to avoid the verified failure modes:
  - cloneProtocol: https  -> the discovered repoURL is HTTPS, matching the
    AppProject sourceRepos + the repo creds (SSH default would black-hole every
    app at IsSourcePermitted).
  - project lowercased     -> matches the (lowercase) AppProject name; ArgoCD's
    URL binding is case-insensitive but the project NAME lookup is literal.
  - filters ^team-.+       -> a bare "team-" (empty suffix) is never discovered.

Isolation is enforced by ArgoCD at sync (IsSourcePermitted against the team
AppProject's sourceRepos + IsDestinationPermitted against its destinations), so
each team's AppProject MUST pin sourceRepos to the exact team repo URL (never the
"*" wildcard) and allow the team namespace in destinations.

Rendered only when a provider/org is configured. The applicationset-controller
reads the SCM credential from its OWN release namespace.
*/ -}}
{{- $scm := .Values.clustraScm | default dict -}}
{{- $legacyOrg := .Values.clustraGithubOrg | default "" -}}
{{- $legacySecret := .Values.clustraScmSecret | default dict -}}
{{- /* provider precedence: explicit clustraScm.provider, else legacy clustraGithubOrg => github */ -}}
{{- $provider := $scm.provider | default (ternary "github" "" (ne $legacyOrg "")) -}}
{{- if $provider -}}
{{- /* owner: GitHub/Gitea org, GitLab group, Bitbucket workspace, Bitbucket Server projectKey, Azure DevOps org */ -}}
{{- $owner := $scm.owner | default $legacyOrg -}}
{{- if not $owner }}{{ fail "clustra SCM enabled but no owner set — set clustraScm.owner (or clustraGithubOrg for github)" }}{{- end -}}
{{- $tokenRef := $scm.tokenRef | default dict -}}
{{- $passwordRef := $scm.passwordRef | default dict -}}
{{- $cloneProtocol := $scm.cloneProtocol | default "https" -}}
{{- $repoFilter := $scm.repoFilter | default "^team-.+" -}}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: clustra-team-models
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # gen-0: discover every team-* repo for the owner (HTTPS clone URLs).
          - scmProvider:
              cloneProtocol: {{ $cloneProtocol | quote }}
              {{- if eq $provider "github" }}
              github:
                organization: {{ $owner | quote }}
                {{- with $scm.api }}
                api: {{ . | quote }}
                {{- end }}
                {{- if $scm.allBranches }}
                allBranches: true
                {{- end }}
                {{- if or $scm.appSecretName $legacySecret.appSecretName }}
                appSecretName: {{ (coalesce $scm.appSecretName $legacySecret.appSecretName) | quote }}
                {{- else if or $tokenRef.secretName $legacySecret.secretName }}
                tokenRef:
                  secretName: {{ (coalesce $tokenRef.secretName $legacySecret.secretName) | quote }}
                  key: {{ (coalesce $tokenRef.key $legacySecret.key "token") | quote }}
                {{- end }}
              {{- else if eq $provider "gitlab" }}
              gitlab:
                group: {{ $owner | quote }}
                includeSubgroups: {{ $scm.includeSubgroups | default true }}
                {{- with $scm.api }}
                api: {{ . | quote }}
                {{- end }}
                {{- if $scm.allBranches }}
                allBranches: true
                {{- end }}
                tokenRef:
                  secretName: {{ required "clustraScm.tokenRef.secretName is required for gitlab" $tokenRef.secretName | quote }}
                  key: {{ $tokenRef.key | default "token" | quote }}
              {{- else if eq $provider "gitea" }}
              gitea:
                owner: {{ $owner | quote }}
                api: {{ required "clustraScm.api is required for gitea" $scm.api | quote }}
                {{- if $scm.allBranches }}
                allBranches: true
                {{- end }}
                {{- if $scm.insecure }}
                insecure: true
                {{- end }}
                tokenRef:
                  secretName: {{ required "clustraScm.tokenRef.secretName is required for gitea" $tokenRef.secretName | quote }}
                  key: {{ $tokenRef.key | default "token" | quote }}
              {{- else if eq $provider "bitbucket" }}
              bitbucket:
                owner: {{ $owner | quote }}
                user: {{ required "clustraScm.user is required for bitbucket cloud" $scm.user | quote }}
                {{- if $scm.allBranches }}
                allBranches: true
                {{- end }}
                appPasswordRef:
                  secretName: {{ required "clustraScm.passwordRef.secretName is required for bitbucket cloud" $passwordRef.secretName | quote }}
                  key: {{ $passwordRef.key | default "password" | quote }}
              {{- else if eq $provider "bitbucketServer" }}
              bitbucketServer:
                project: {{ $owner | quote }}
                api: {{ required "clustraScm.api is required for bitbucketServer" $scm.api | quote }}
                {{- if $scm.allBranches }}
                allBranches: true
                {{- end }}
                {{- if $scm.username }}
                basicAuth:
                  username: {{ $scm.username | quote }}
                  passwordRef:
                    secretName: {{ required "clustraScm.passwordRef.secretName is required for bitbucketServer basicAuth" $passwordRef.secretName | quote }}
                    key: {{ $passwordRef.key | default "password" | quote }}
                {{- else }}
                bearerToken:
                  tokenRef:
                    secretName: {{ required "clustraScm.tokenRef.secretName is required for bitbucketServer bearerToken" $tokenRef.secretName | quote }}
                    key: {{ $tokenRef.key | default "token" | quote }}
                {{- end }}
              {{- else if eq $provider "azureDevOps" }}
              azureDevOps:
                organization: {{ $owner | quote }}
                teamProject: {{ required "clustraScm.teamProject is required for azureDevOps" $scm.teamProject | quote }}
                {{- with $scm.api }}
                api: {{ . | quote }}
                {{- end }}
                {{- if $scm.allBranches }}
                allBranches: true
                {{- end }}
                accessTokenRef:
                  secretName: {{ required "clustraScm.tokenRef.secretName is required for azureDevOps" $tokenRef.secretName | quote }}
                  key: {{ $tokenRef.key | default "token" | quote }}
              {{- else }}
              {{ fail (printf "unsupported clustraScm.provider %q (use github|gitlab|gitea|bitbucket|bitbucketServer|azureDevOps)" $provider) }}
              {{- end }}
              filters:
                - repositoryMatch: {{ $repoFilter | quote }}
              requeueAfterSeconds: {{ .Values.clustraScmRequeueSeconds | default 1800 }}
          # gen-1: one model dir per discovered repo, at <namespace>/<deployment>.
          # {{`{{ .url }}`}} from gen-0 is HTTPS. '*/*' matches the two-level layout
          # ai-service commits: the FIRST path segment is the target namespace, the
          # basename is the deployment.
          - git:
              repoURL: '{{`{{ .url }}`}}'
              revision: HEAD
              directories:
                - path: '*/*'
              requeueAfterSeconds: {{ .Values.clustraGitRequeueSeconds | default 180 }}
  template:
    metadata:
      # app name = <namespace>-<deployment> (globally unique; the namespace already
      # carries the team). Matches ai-service's namespace_app_name prediction.
      name: '{{`{{ index .path.segments 0 }}-{{ .path.basenameNormalized }}`}}'
      namespace: {{ .Release.Namespace | quote }}
      finalizers:
        # MUST be the /background variant. When a deployment is removed the
        # ApplicationSet DELETES this Application, and that cascade defaults to
        # FOREGROUND (controller/appcontroller.go:1290 — background only if the
        # app carries BackgroundPropagationPolicyFinalizer). Foreground stamps a
        # `foregroundDeletion` finalizer on the whole DGD tree, which then wedges
        # forever on the Dynamo operator's un-updatable worker pods. NOTE: the
        # `PrunePropagationPolicy=background` syncOption below does NOT cover this
        # path — it only governs in-sync pruning, not Application deletion.
        - resources-finalizer.argocd.argoproj.io/background
    spec:
      project: '{{`{{ trimPrefix "team-" .repository | lower }}`}}'
      source:
        repoURL: '{{`{{ .url }}`}}'
        targetRevision: HEAD
        path: '{{`{{ .path.path }}`}}'
      destination:
        server: {{ .Values.clustraDestinationServer | default "https://kubernetes.default.svc" | quote }}
        # the deployer-chosen namespace = the first path segment. Must be permitted
        # by the team AppProject's destinations (onboarded ns: <team> or <team>-*).
        namespace: '{{`{{ index .path.segments 0 }}`}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: true
        syncOptions:
          - PrunePropagationPolicy=background
          - PruneLast=true
          - CreateNamespace=false
        retry:
          limit: 5
          backoff:
            duration: 15s
            factor: 2
            maxDuration: 5m
{{- end }}
