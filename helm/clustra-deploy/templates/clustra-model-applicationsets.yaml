{{- /*
ONE global ApplicationSet for the whole platform — generates one Application per
model directory across every team's repo, with the clean-delete sync policy
baked in. Replaces the old per-tenant ApplicationSets.

Generator = matrix( SCM-provider(github, org, repos matching ^team-.+ ) x
git-directories('*') ). For each team-* repo it discovers, it lists the model
directories and stamps an Application:
  * name      = <repo>-<dir>            (globally unique across teams)
  * project   = <repo> minus "team-" prefix, lowercased   (== the team AppProject)
  * source    = the team repo (HTTPS) / the model dir
  * namespace = the team (one shared namespace per team)
  * syncPolicy = prune + background + resources-finalizer  (the orphaned-pods fix)

HARD REQUIREMENTS baked in to avoid the verified failure modes:
  - cloneProtocol: https  -> the discovered repoURL is HTTPS, matching the
    AppProject sourceRepos + the GitHub App creds (SSH default would black-hole
    every app at IsSourcePermitted).
  - project lowercased     -> matches the (lowercase) AppProject name; ArgoCD's
    URL binding is case-insensitive but the project NAME lookup is literal.
  - filters ^team-.+       -> a bare "team-" (empty suffix) is never discovered.

Isolation is enforced by ArgoCD at sync (IsSourcePermitted against the team
AppProject's sourceRepos + IsDestinationPermitted against its destinations), so
each team's AppProject MUST pin sourceRepos to the exact team repo URL (never the
"*" wildcard) and allow the team namespace in destinations.

Rendered only when an org is configured. The applicationset-controller reads the
SCM token from its OWN release namespace.
*/ -}}
{{- if .Values.clustraGithubOrg }}
{{- $scm := .Values.clustraScmSecret | default dict }}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: clustra-team-models
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # gen-0: discover every team-* repo in the org (HTTPS clone URLs).
          - scmProvider:
              cloneProtocol: https
              github:
                organization: {{ .Values.clustraGithubOrg | quote }}
                {{- if $scm.appSecretName }}
                appSecretName: {{ $scm.appSecretName | quote }}
                {{- else if $scm.secretName }}
                tokenRef:
                  secretName: {{ $scm.secretName | quote }}
                  key: {{ $scm.key | default "token" | quote }}
                {{- end }}
              filters:
                - repositoryMatch: '^team-.+'
              requeueAfterSeconds: {{ .Values.clustraScmRequeueSeconds | default 1800 }}
          # gen-1: one model dir per discovered repo. {{`{{ .url }}`}} from gen-0 is HTTPS.
          - git:
              repoURL: '{{`{{ .url }}`}}'
              revision: HEAD
              directories:
                - path: '*'
              requeueAfterSeconds: {{ .Values.clustraGitRequeueSeconds | default 180 }}
  template:
    metadata:
      name: '{{`{{ .repository }}-{{ .path.basenameNormalized }}`}}'
      namespace: {{ .Release.Namespace | quote }}
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{`{{ trimPrefix "team-" .repository | lower }}`}}'
      source:
        repoURL: '{{`{{ .url }}`}}'
        targetRevision: HEAD
        path: '{{`{{ .path.path }}`}}'
      destination:
        server: {{ .Values.clustraDestinationServer | default "https://kubernetes.default.svc" | quote }}
        # one shared namespace per team (the project name). Must be allowed by the
        # team AppProject's destinations (e.g. a "<team>*" or exact "<team>" pattern).
        namespace: '{{`{{ trimPrefix "team-" .repository | lower }}`}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: true
        syncOptions:
          - PrunePropagationPolicy=background
          - PruneLast=true
          - CreateNamespace=false
        retry:
          limit: 5
          backoff:
            duration: 15s
            factor: 2
            maxDuration: 5m
{{- end }}
