version: 2
# Dependabot config is intentionally narrow for the Clustra Deploy fork:
# we only scan npm deps under /ui/, because that's the one tree we
# meaningfully diverge from upstream argocd on. Go modules, GitHub
# Actions, and Docker base images are deliberately NOT scanned here —
# those bumps flow in via upstream argo-cd merges (upstream's own
# Dependabot handles them coherently, with coordinated updates).
# See ui/BRANDING.md and commit history for context.
updates:
  - package-ecosystem: "npm"
    directory: "/ui/"
    schedule:
      interval: "daily"
